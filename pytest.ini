[pytest]
# ── Test discovery ────────────────────────────────
testpaths    = tests
python_files   = test_*.py
python_classes   = Test*
python_functions = test_*

# ── Runtime options ───────────────────────────────
# -v                         verbose: show each test name and PASS/FAIL
# --cov=src                  measure coverage for the src/ package
# --cov-report=term-missing  print uncovered line numbers in the terminal
addopts =
    -v
    --cov=src
    --cov-report=term-missing

# ── Import resolution ─────────────────────────────
# Adds the project root to sys.path so `from src.xxx import ...` works
pythonpath = .

# ── Warnings ──────────────────────────────────────
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

# ── Custom markers ────────────────────────────────
# Register markers here to avoid PytestUnknownMarkWarning.
# Usage in a test: @pytest.mark.slow
markers =
    slow: marks tests as slow (run with -m slow)
    integration: marks tests that touch the filesystem or trained models
