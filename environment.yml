name: mlops_project  # Name of the conda environment

channels:
  - conda-forge  # Community channel with most up-to-date packages
  - defaults

dependencies:
  # Core Python
  - python>=3.9 

  # Core data stack
  - numpy=1.26.4
  - pandas=2.2.0

  # ML pipeline
  - scikit-learn=1.4.1
  - joblib=1.3.2

  # Config management
  - pyyaml=6.0.1
  - python-dotenv=1.0.1

  # Optional reporting (keep only if actually used)
  - matplotlib=3.8.2
  - seaborn=0.13.2

  # Excel support (remove if unused)
  - openpyxl=3.1.2

  # Testing
  - pytest=8.0.0

  - pip

  - pip:
      - pytest-cov==4.1.0
      - black==24.2.0
      - flake8==7.0.0