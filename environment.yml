name: mlops_project

channels:
  - conda-forge
  - defaults

dependencies:
  # Stable Python
  - python=3.11

  # Core data stack
  - numpy=1.26.4
  - pandas=2.2.0
  - pyarrow=15.0.2

  # ML pipeline
  - scikit-learn=1.4.1
  - joblib=1.3.2

  # Config and secrets management
  - pyyaml=6.0.1
  - python-dotenv=1.0.1

  # API serving
  - fastapi=0.110.0
  - uvicorn=0.29.0
  - pydantic=2.6.4
  - httpx=0.27.0

  # Experiment tracking
  - wandb>=0.18.0

  # Reporting
  - matplotlib=3.8.2
  - seaborn=0.13.2

  # Excel support
  - openpyxl=3.1.2

  # Notebook support
  - ipykernel

  # Testing
  - pytest=8.0.0

  - pip

  - pip:
      - pytest-cov==4.1.0
      - black==24.2.0
      - flake8==7.0.0